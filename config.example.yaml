# 威科夫全自动逻辑引擎 - 配置文件模板
# 最后更新: 2026年1月20日
# 版本: v1.0

# ============================================================================
# 重要提示
# ============================================================================
# 1. 复制此文件为 config.yaml 并修改参数
# 2. 敏感信息建议使用环境变量
# 3. 所有参数均有默认值，可以不配置
# 4. 修改后重启系统生效

# ============================================================================
# 数据源配置
# ============================================================================
data_sources:
  # 加密货币市场
  crypto:
    enabled: true
    exchanges: ["binance", "bybit"]  # 支持交易所
    symbols: ["BTC/USDT", "ETH/USDT"]  # 交易对
    timeframes: ["4h", "1h", "15m", "5m"]  # 时间周期
    api_key: ""  # 通过环境变量 WYCKOFF_API_KEY 设置
    api_secret: ""  # 通过环境变量 WYCKOFF_API_SECRET 设置
    
  # 股票市场（需要yfinance）
  stocks:
    enabled: false
    symbols: ["AAPL", "GOOGL", "TSLA", "MSFT"]
    timeframes: ["1d", "4h", "1h"]
    
  # 数据文件
  file:
    enabled: false
    historical_data_path: "data/historical"
    realtime_data_path: "data/realtime"
    file_formats: ["csv", "parquet", "json"]

# ============================================================================
# 数据管道配置
# ============================================================================
data_pipeline:
  # 自定义API配置
  custom_api:
    enabled: false
    api_url: ""  # 自定义API的URL
    api_key: ""  # API密钥（可选）
    request_timeout: 30  # 请求超时时间（秒）
    max_retries: 3  # 最大重试次数

# ============================================================================
# 威科夫核心参数
# ============================================================================
wyckoff:
  # 成交量分析
  volume_analysis:
    min_volume_ratio: 1.5      # 最小成交量比率（相对于MA）
    volume_spike_threshold: 2.0 # 成交量突增阈值
    volume_confirmation_bars: 3 # 成交量确认K线数
    
  # 价格行为
  price_action:
    min_body_ratio: 0.3         # 最小实体比例（实体/整个K线）
    pinbar_threshold: 0.7       # 针形线阈值（影线/整个K线）
    engulfing_ratio: 1.2        # 吞噬比例
    
  # 遗产系统
  heritage:
    decay_rate: 0.85           # 遗产衰减率（每根K线）
    min_score: 0.3             # 最小遗产分数
    max_score: 1.0             # 最大遗产分数
    transfer_efficiency: 0.7   # 遗产传递效率
    
  # 确认条件
  confirmation:
    bars_required: 3           # 确认所需K线数
    breakout_pct: 0.02         # 突破确认百分比（2%）
    retest_tolerance: 0.005    # 回踩容忍度（0.5%）
    
  # 状态机设置
  state_machine:
    timeout_bars: 20           # 状态超时K线数
    min_evidence_score: 0.6    # 最小证据分数
    transition_threshold: 0.75 # 状态转换阈值
    parallel_paths: 3          # 并行路径数量

# ============================================================================
# 多周期融合配置
# ============================================================================
multi_timeframe:
  # 周期定义
  timeframes:
    - name: "weekly"      # 周线
      minutes: 10080
      weight: 0.25
      
    - name: "daily"       # 日线
      minutes: 1440
      weight: 0.20
      
    - name: "four_hour"   # 4小时
      minutes: 240
      weight: 0.18
      
    - name: "one_hour"    # 1小时
      minutes: 60
      weight: 0.15
      
    - name: "fifteen_min" # 15分钟
      minutes: 15
      weight: 0.12
      
    - name: "five_min"    # 5分钟
      minutes: 5
      weight: 0.10
  
  # 冲突解决规则
  conflict_resolution:
    enable_priority_override: true    # 启用优先级覆盖
    trend_overrides_range: true       # 趋势优先于盘整
    higher_tf_weight_multiplier: 1.5  # 高周期权重乘数
    timeout_conflict_resolution: 10   # 冲突解决超时（秒）
    
  # 证据融合
  evidence_fusion:
    method: "weighted_average"  # weighted_average, bayesian, dempster_shafer
    min_agreement: 0.6          # 最小一致度
    disagreement_penalty: 0.3    # 不一致惩罚

# ============================================================================
# 风险管理配置
# ============================================================================
risk_management:
  # 头寸规模
  position_sizing:
    method: "fixed_fractional"  # fixed_fractional, kelly, optimal_f
    max_position_size: 0.1      # 最大仓位比例（10%）
    min_position_size: 0.01     # 最小仓位比例（1%）
    risk_per_trade: 0.02        # 每笔交易风险（2%）
    
  # 止损设置
  stop_loss:
    method: "atr"  # fixed, atr, trailing, volatility
    fixed_percentage: 0.02     # 固定止损比例（2%）
    atr_multiplier: 1.5        # ATR倍数
    trailing_enabled: true
    trailing_activation_pct: 0.015  # 跟踪止损激活百分比（1.5%）
    trailing_distance_pct: 0.01     # 跟踪距离（1%）
    
  # 止盈设置
  take_profit:
    method: "risk_reward"  # fixed, risk_reward, trailing
    risk_reward_ratio: 2.0     # 风险回报比
    fixed_percentage: 0.04     # 固定止盈比例（4%）
    partial_profit_levels: [0.5, 0.8, 1.0]  # 分批止盈水平
    partial_profit_sizes: [0.3, 0.3, 0.4]   # 分批止盈比例
    
  # 资金管理
  capital_management:
    initial_capital: 10000.0   # 初始资金
    max_drawdown_limit: 0.2    # 最大回撤限制（20%）
    daily_loss_limit: 0.05     # 单日亏损限制（5%）
    weekly_loss_limit: 0.1     # 单周亏损限制（10%）

# ============================================================================
# 性能与监控配置
# ============================================================================
performance:
  # 缓存设置
  cache:
    enabled: true
    size_mb: 512               # 缓存大小（MB）
    ttl_seconds: 3600          # 缓存存活时间（秒）
    cleanup_interval: 300      # 清理间隔（秒）
    
  # 监控设置
  monitoring:
    health_check_interval: 300   # 健康检查间隔（秒）
    performance_log_interval: 60 # 性能日志间隔（秒）
    memory_check_interval: 30    # 内存检查间隔（秒）
    
  # 资源限制
  resource_limits:
    max_memory_usage: 0.8        # 最大内存使用率
    max_cpu_usage: 0.7           # 最大CPU使用率
    max_disk_usage: 0.9          # 最大磁盘使用率
    
  # 日志设置
  logging:
    level: "INFO"            # DEBUG, INFO, WARNING, ERROR
    file: "logs/wyckoff.log"
    rotation: "daily"        # daily, weekly, monthly
    retention_days: 30       # 日志保留天数
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    
  # 性能优化
  optimization:
    enable_lazy_loading: true
    enable_parallel_processing: true
    max_workers: 4           # 最大工作线程数
    batch_size: 100          # 批处理大小

# ============================================================================
# 系统协调器配置
# ============================================================================
orchestrator:
  # 运行模式
  default_mode: "simulation"   # realtime, backtest, simulation
  environment: "development"   # development, staging, production
  
  # 模拟模式
  simulation:
    speed: "1x"               # 1x, 5x, 10x, max
    start_date: "2025-01-01"
    end_date: "2025-12-31"
    
  # 回测模式
  backtest:
    initial_capital: 10000.0
    commission_rate: 0.001     # 手续费率（0.1%）
    slippage_pct: 0.0005       # 滑点百分比（0.05%）
    enable_walk_forward: true  # 启用前向分析
    walk_forward_windows: 5    # 前向窗口数
    
  # 实时模式
  realtime:
    data_refresh_interval: 60  # 数据刷新间隔（秒）
    signal_check_interval: 30  # 信号检查间隔（秒）
    max_concurrent_symbols: 5  # 最大并发交易品种
    enable_auto_trading: false # 启用自动交易（谨慎！）
    
  # 决策参数
  decision:
    min_confidence: 0.65       # 最小置信度
    confirmation_required: true # 需要确认
    max_decisions_per_hour: 12  # 每小时最大决策数

# ============================================================================
# 自动化进化配置
# ============================================================================
automated_evolution:
  # 错题本设置
  mistake_book:
    enabled: true
    max_entries: 1000
    analysis_interval: 86400   # 分析间隔（秒，24小时）
    retention_days: 90         # 记录保留天数
    min_occurrences_for_learning: 3  # 学习所需最小出现次数
    
  # 权重变异
  weight_variation:
    enabled: true
    method: "genetic"          # genetic, gradient, random
    max_variation_pct: 0.05    # 最大变异百分比（5%）
    adaptation_rate: 0.1       # 适应率
    mutation_rate: 0.15        # 变异率
    crossover_rate: 0.7        # 交叉率
    
  # WFA前向分析
  wfa_backtest:
    enabled: true
    train_test_ratio: 0.7      # 训练测试比例
    min_train_periods: 20      # 最小训练周期数
    validation_method: "out_of_sample"  # out_of_sample, cross_validation
    
  # 进化约束
  constraints:
    protect_core_logic: true   # 保护核心逻辑
    max_parameter_change: 0.2  # 最大参数变化（20%）
    stability_requirement: 0.8 # 稳定性要求
    diversity_requirement: 0.3  # 多样性要求

# ============================================================================
# 通知配置（可选）
# ============================================================================
notifications:
  # 启用通知
  enabled: false
  
  # 邮件通知
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email: ""
    sender_password: ""
    recipient_emails: []
    notification_types: ["ERROR", "SIGNAL", "PERFORMANCE"]
    
  # Telegram通知
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    notification_types: ["ERROR", "SIGNAL"]
    
  # Webhook通知
  webhook:
    enabled: false
    webhook_url: ""
    secret_key: ""
    notification_types: ["ALL"]
    
  # 通知事件
  events:
    trade_signal: true
    system_error: true
    performance_alert: true
    health_warning: true
    evolution_update: false

# ============================================================================
# 可视化配置
# ============================================================================
visualization:
  # 图表设置
  charts:
    enable_live_charts: true
    theme: "dark"              # light, dark
    color_scheme: "plotly_dark"
    update_interval: 5         # 更新间隔（秒）
    
  # 仪表板
  dashboard:
    enabled: true
    port: 8050                 # Dash服务器端口
    host: "127.0.0.1"
    auto_open_browser: true
    
  # 报告生成
  reporting:
    auto_generate_reports: true
    report_interval: "daily"   # daily, weekly, monthly
    report_formats: ["html", "pdf", "csv"]
    report_directory: "exports/reports"

# ============================================================================
# 高级配置（仅限高级用户）
# ============================================================================
advanced:
  # 算法参数
  algorithm:
    fvg_sensitivity: 0.7       # FVG敏感度（0.0-1.0）
    curve_fitting_precision: 0.8  # 曲线拟合精度
    regime_confidence_threshold: 0.65  # 体制置信度阈值
    volume_profile_resolution: 0.001  # 成交量分布分辨率
    
  # 实验功能
  experimental:
    enable_ml_enhancements: false
    enable_correlation_analysis: false
    enable_sentiment_integration: false
    enable_blockchain_analysis: false
    
  # 调试模式
  debug:
    enable_debug_logging: false
    export_decision_logs: false
    visualize_state_transitions: false
    enable_profiling: false
    profiling_interval: 600     # 性能分析间隔（秒）
    
  # 开发设置
  development:
    hot_reload: false
    auto_run_tests: false
    code_coverage_threshold: 0.8

# ============================================================================
# 环境变量覆盖
# ============================================================================
# 以下参数可通过环境变量覆盖：
#   WYCKOFF_ENVIRONMENT - 运行环境（development/staging/production）
#   WYCKOFF_LOG_LEVEL - 日志级别
#   WYCKOFF_API_KEY - API密钥
#   WYCKOFF_API_SECRET - API密钥
#   WYCKOFF_DB_URL - 数据库URL
#   WYCKOFF_REDIS_URL - Redis URL

# ============================================================================
# 配置验证规则
# ============================================================================
# 系统启动时会验证以下规则：
# 1. 所有权重总和必须为1.0（允许±0.01误差）
# 2. 所有百分比必须在0-1之间
# 3. 时间间隔必须为正数
# 4. 必需参数不能为空

# ============================================================================
# 配置更新说明
# ============================================================================
# 1. 修改配置后需要重启系统
# 2. 建议先备份原配置
# 3. 可以使用配置验证工具：python -m src.utils.config_validator
# 4. 生产环境建议使用环境变量存储敏感信息

# ============================================================================
# 支持与帮助
# ============================================================================
# 1. 查看文档：docs/deployment_guide.md
# 2. 运行演示：python examples/final_digital_life_demo.py
# 3. 查看日志：logs/wyckoff.log
# 4. 运行测试：pytest tests/

# 配置文件结束