name: position_manager
version: "3.0.0"
description: "仓位管理插件 - 管理持仓生命周期、止损止盈、信号反转出场"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: executor

dependencies:
  - risk_management
  - signal_validation

events:
  publishes:
    - position.opened
    - position.closed
    - position.updated
    - position.stop_loss_updated
    - position.partial_close
  subscribes:
    - orchestrator.decision_made
    - risk_management.circuit_breaker_tripped
    - market.price_update
    - system.shutdown

config_schema:
  max_positions:
    type: int
    default: 3
    description: "最大同时持仓数量"
  max_position_size:
    type: float
    default: 0.1
    description: "单笔最大仓位比例"
  min_position_size:
    type: float
    default: 0.01
    description: "单笔最小仓位比例"
  risk_per_trade:
    type: float
    default: 0.02
    description: "单笔交易风险比例"
  stop_loss:
    type: object
    description: "止损配置"
  signal_exit:
    type: object
    description: "信号出场配置"
