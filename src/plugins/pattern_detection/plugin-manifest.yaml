name: pattern_detection
version: "1.0.0"
description: "形态检测插件 - 整合TR识别、威科夫阶段检测和曲线边界拟合"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: analysis

dependencies:
  - market_regime
  - perception

events:
  publishes:
    - pattern_detection.tr_detected
    - pattern_detection.wyckoff_phase_detected
    - pattern_detection.boundary_fitted
    - pattern_detection.tr_signals
  subscribes:
    - perception.candle_analyzed
    - market_regime.detected
    - system.config_update

config_schema:
  tr_detector:
    type: object
    description: "TR检测器配置"
  wyckoff_phase:
    type: object
    description: "威科夫阶段检测器配置"
  curve_boundary:
    type: object
    description: "曲线边界拟合器配置"
