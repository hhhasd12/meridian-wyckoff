name: perception
version: "1.0.0"
description: "感知层插件 - K线物理属性分析、FVG缺口检测、针vs实体辩证识别"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: analysis

dependencies:
  - market_regime

events:
  publishes:
    - perception.candle_analyzed
    - perception.fvg_detected
    - perception.fvg_mitigated
    - perception.pin_body_analyzed
  subscribes:
    - data_pipeline.ohlcv_ready
    - market_regime.detected
    - system.config_update

config_schema:
  fvg_threshold_percent:
    type: float
    default: 0.5
    description: "FVG阈值百分比"
  fvg_auto_threshold:
    type: bool
    default: true
    description: "是否自动计算FVG阈值"
  fvg_max_gap_age_bars:
    type: int
    default: 100
    description: "FVG最大生命周期(K线数)"
  pin_body_volatility_index:
    type: float
    default: 1.0
    description: "默认波动率指数"
