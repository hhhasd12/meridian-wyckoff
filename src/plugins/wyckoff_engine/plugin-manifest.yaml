name: wyckoff_engine
version: "1.0.0"
description: "统一信号引擎 — 实盘和进化的唯一信号来源"
author: "Wyckoff Engine Team"
entry_point: plugin
plugin_type: core

dependencies:
  - market_regime
  - wyckoff_state_machine
  - weight_system
  - signal_validation
  - pattern_detection
  - perception
  - data_pipeline
  - risk_management

events:
  publishes:
    - wyckoff_engine.decision
    - wyckoff_engine.state_changed
  subscribes:
    - data_pipeline.ohlcv_ready
