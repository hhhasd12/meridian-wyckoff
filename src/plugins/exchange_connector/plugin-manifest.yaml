name: exchange_connector
version: "1.0.0"
description: "交易所连接器插件 - 管理加密货币交易所连接（ccxt）"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: connector

dependencies: []

events:
  publishes:
    - exchange.connected
    - exchange.disconnected
    - exchange.ohlcv_fetched
    - exchange.ticker_fetched
    - exchange.error
  subscribes:
    - system.config_update

config_schema:
  default_exchange:
    type: string
    default: "binance"
    description: "默认交易所"
  request_timeout:
    type: int
    default: 30
    description: "请求超时时间（秒）"
  enable_rate_limit:
    type: bool
    default: true
    description: "启用速率限制"
  max_retries:
    type: int
    default: 3
    description: "最大重试次数"
  retry_delay:
    type: float
    default: 1.0
    description: "重试延迟（秒）"
  api_key:
    type: string
    default: ""
    description: "API密钥"
  api_secret:
    type: string
    default: ""
    description: "API密钥"
  proxy:
    type: string
    default: ""
    description: "代理地址"
