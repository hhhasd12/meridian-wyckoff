name: self_correction
version: "1.0.0"
description: "自我纠错插件 - 封装 SelfCorrectionWorkflow，实现错题本→权重变异→WFA验证→配置更新的闭环"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: analysis

dependencies:
  - evolution
  - market_regime

events:
  publishes:
    - self_correction.cycle_started
    - self_correction.cycle_completed
    - self_correction.correction_applied
    - self_correction.error_occurred
  subscribes:
    - evolution.cycle_completed
    - system.config_update

config_schema:
  enabled:
    type: bool
    default: true
    description: "是否启用自我纠错"
  correction_interval:
    type: int
    default: 86400
    description: "纠错周期间隔（秒，默认24小时）"
  max_variation_pct:
    type: float
    default: 0.05
    description: "最大变异百分比"
