name: risk_management
version: "1.0.0"
description: "风险管理插件 - 整合熔断器和异常验证器"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: analysis

dependencies:
  - market_regime
  - signal_validation

events:
  publishes:
    - risk_management.circuit_breaker_tripped
    - risk_management.circuit_breaker_recovered
    - risk_management.anomaly_validated
    - risk_management.data_quality_updated
  subscribes:
    - signal_validation.entry_validated
    - market_regime.detected
    - system.config_update

config_schema:
  circuit_breaker:
    type: object
    description: "熔断器配置"
  anomaly_validator:
    type: object
    description: "异常验证器配置"
