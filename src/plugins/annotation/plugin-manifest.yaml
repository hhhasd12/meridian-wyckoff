name: annotation
version: "3.0.0"
description: "威科夫标注数据管理 — 存储用户对事件/水平线/结构的标注"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: optional

dependencies: []

events:
  publishes:
    - annotation.created
    - annotation.deleted
  subscribes: []

config_schema:
  data_dir:
    type: string
    default: "./data/annotations"
    description: "标注数据存储目录"
