name: telegram_notifier
version: "3.0.0"
description: "Telegram 告警通知 — 订阅关键事件并发送 Telegram 消息"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: optional

dependencies: []

events:
  publishes: []
  subscribes:
    - position.opened
    - position.closed
    - risk_management.circuit_breaker_tripped
    - system.shutdown

config_schema:
  bot_token:
    type: string
    default: ""
    description: "Telegram Bot Token (也可通过 WYCKOFF_TELEGRAM_BOT_TOKEN 环境变量设置)"
  chat_id:
    type: string
    default: ""
    description: "Telegram Chat ID (也可通过 WYCKOFF_TELEGRAM_CHAT_ID 环境变量设置)"
  enabled:
    type: boolean
    default: true
    description: "是否启用 Telegram 通知"
