name: signal_validation
version: "3.0.0"
description: "信号验证插件 - 整合突破验证、微观入场验证和冲突解决"
author: "Wyckoff Engine Team"
entry_point: plugin

plugin_type: analysis

dependencies:
  - market_regime
  - pattern_detection
  - weight_system

events:
  publishes:
    - signal_validation.breakout_detected
    - signal_validation.breakout_updated
    - signal_validation.entry_validated
    - signal_validation.conflict_resolved
  subscribes:
    - state_machine.signal_generated
    - pattern_detection.tr_signals
    - weight_system.weighted_decision_made
    - system.config_update

config_schema:
  breakout_validator:
    type: object
    description: "突破验证器配置"
  micro_entry_validator:
    type: object
    description: "微观入场验证器配置"
  conflict_resolver:
    type: object
    description: "冲突解决器配置"
