# 威科夫全自动逻辑引擎 - 生产环境配置文件
# 最后更新: 2026-02-06
# 版本: v1.0

# ============================================================================
# 重要提示
# ============================================================================
# 1. 修改此文件后重启系统生效
# 2. 敏感信息建议使用环境变量
# 3. 生产环境请谨慎设置 paper_trading = false

# ============================================================================
# 核心运行模式配置
# ============================================================================
paper_trading: true  # true=模拟交易，false=实盘交易（危险！）
trading_mode: "futures"       # futures=合约, spot=现货
leverage: 5                   # 杠杆倍数 (建议从 3-5 倍开始)
allow_shorting: true          # 允许做空

# ============================================================================
# 数据源配置
# ============================================================================
data_sources:
  # 加密货币市场
  crypto:
    enabled: true
    exchanges: ["binance", "bybit"]
    symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT"]
    timeframes: ["4h", "1h", "15m", "5m"]
    api_key: ""  # 通过环境变量 WYCKOFF_API_KEY 设置
    api_secret: ""  # 通过环境变量 WYCKOFF_API_SECRET 设置
    # 代理配置（中国大陆用户需要设置）
    # 也可通过环境变量 HTTPS_PROXY / HTTP_PROXY 设置
    proxy: ""  # 例如: "http://127.0.0.1:7890"

# ============================================================================
# 系统协调器配置
# ============================================================================
orchestrator:
  # 运行模式
  default_mode: "simulation"   # realtime, backtest, simulation
  environment: "production"    # development, staging, production
  
  # 实时模式
  realtime:
    data_refresh_interval: 60   # 数据刷新间隔（秒）
    signal_check_interval: 30   # 信号检查间隔（秒）
    max_concurrent_symbols: 3   # 最大并发交易品种
    enable_auto_trading: false  # 启用自动交易（谨慎！仅在paper_trading=false时有效）
    
  # 决策参数
  decision:
    min_confidence: 0.65        # 最小置信度
    confirmation_required: true  # 需要确认
    max_decisions_per_hour: 12   # 每小时最大决策数

# ============================================================================
# 运行参数配置
# ============================================================================
processing_interval: 60          # 数据处理间隔（秒）
evolution_interval: 3600         # 进化间隔（秒）
health_report_interval: 3600     # 健康报告间隔（秒）
use_real_data: true              # 使用真实数据
symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT"]
timeframes: ["H4", "H1", "M15"]
historical_days: 365              # 历史数据天数

# ============================================================================
# 日志配置
# ============================================================================
logging:
  level: "INFO"                  # DEBUG, INFO, WARNING, ERROR
  file: "logs/wyckoff_production.log"
  rotation: "daily"              # daily, weekly, monthly
  retention_days: 30             # 日志保留天数
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ============================================================================
# 风险管理配置
# ============================================================================
risk_management:
  # 头寸规模
  position_sizing:
    method: "fixed_fractional"   # fixed_fractional, kelly, optimal_f
    max_position_size: 0.1       # 最大仓位比例（10%）
    min_position_size: 0.01      # 最小仓位比例（1%）
    risk_per_trade: 0.02         # 每笔交易风险（2%）
    
  # 止损设置
  stop_loss:
    method: "atr"                # fixed, atr, trailing, volatility
    fixed_percentage: 0.02       # 固定止损比例（2%）
    atr_multiplier: 1.5          # ATR倍数
    trailing_enabled: true
    trailing_activation_pct: 0.015  # 跟踪止损激活百分比（1.5%）
    trailing_distance_pct: 0.01     # 跟踪距离（1%）
    
  # 止盈设置
  take_profit:
    method: "risk_reward"        # fixed, risk_reward, trailing
    risk_reward_ratio: 2.0       # 风险回报比
    fixed_percentage: 0.04       # 固定止盈比例（4%）
    partial_profit_levels: [0.5, 0.8, 1.0]  # 分批止盈水平
    partial_profit_sizes: [0.3, 0.3, 0.4]   # 分批止盈比例
    
  # 资金管理
  capital_management:
    initial_capital: 10000.0     # 初始资金
    max_drawdown_limit: 0.2      # 最大回撤限制（20%）
    daily_loss_limit: 0.05       # 单日亏损限制（5%）
    weekly_loss_limit: 0.1       # 单周亏损限制（10%")
    
  # 合约风控
  margin_mode: "isolated"     # isolated=逐仓, cross=全仓
  liquidation_buffer: 0.1     # 强平预警缓冲 (距离强平价10%强制平仓)

# ============================================================================
# 性能与监控配置
# ============================================================================
performance:
  # 缓存设置
  cache:
    enabled: true
    size_mb: 512                 # 缓存大小（MB）
    ttl_seconds: 3600            # 缓存存活时间（秒）
    cleanup_interval: 300        # 清理间隔（秒）
    
  # 监控设置
  monitoring:
    health_check_interval: 300   # 健康检查间隔（秒）
    performance_log_interval: 60 # 性能日志间隔（秒）
    memory_check_interval: 30    # 内存检查间隔（秒）
    
  # 资源限制
  resource_limits:
    max_memory_usage: 0.8        # 最大内存使用率
    max_cpu_usage: 0.7           # 最大CPU使用率
    max_disk_usage: 0.9          # 最大磁盘使用率

# ============================================================================
# 自动化进化配置
# ============================================================================
automated_evolution:
  # 错题本设置
  mistake_book:
    enabled: true
    max_entries: 1000
    analysis_interval: 86400     # 分析间隔（秒，24小时）
    retention_days: 90           # 记录保留天数
    min_occurrences_for_learning: 50  # 学习所需最小出现次数
    
  # 权重变异
  weight_variation:
    enabled: true
    method: "genetic"            # genetic, gradient, random
    max_variation_pct: 0.05      # 最大变异百分比（5%）
    adaptation_rate: 0.1         # 适应率
    mutation_rate: 0.15          # 变异率
    crossover_rate: 0.7          # 交叉率

# ============================================================================
# 决策可视化配置
# ============================================================================
decision_visualizer:
  # 快照目录
  snapshot_dir: "logs/snapshots"
  
  # 图表参数
  plot_candles: 200  # 显示K线数量
  dpi: 150           # 图像分辨率
  figsize: [14, 10]  # 图像尺寸
  
  # 触发条件
  enable_tr_visualization: true      # TR检测时触发
  enable_state_visualization: true   # 状态变化时触发
  enable_signal_visualization: true  # 交易信号时触发
  
  # 保存策略
  max_snapshots_per_day: 100         # 每天最大快照数
  cleanup_old_snapshots: true        # 清理旧快照
  retention_days: 7                  # 保留天数
  
  # 可视化内容
  show_geometric_shapes: true        # 显示几何形状
  show_support_resistance: true      # 显示支撑阻力
  show_volume_profile: false         # 显示成交量分布
  show_indicators: false             # 显示技术指标

# ============================================================================
# 通知配置（可选）
# ============================================================================
notifications:
  # 启用通知
  enabled: false
  
  # Telegram通知
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    notification_types: ["ERROR", "SIGNAL"]
    
  # 通知事件
  events:
    trade_signal: true
    system_error: true
    performance_alert: true
    health_warning: true

# ============================================================================
# 环境变量覆盖
# ============================================================================
# 以下参数可通过环境变量覆盖：
#   WYCKOFF_PAPER_TRADING - 模拟交易模式（true/false）
#   WYCKOFF_API_KEY - API密钥
#   WYCKOFF_API_SECRET - API密钥
#   WYCKOFF_LOG_LEVEL - 日志级别

# ============================================================================
# 安全警告
# ============================================================================
# 1. 实盘交易前务必充分测试
# 2. 建议先运行模拟交易至少1个月
# 3. 实盘交易时从小资金开始
# 4. 定期备份配置和日志
# 5. 监控系统运行状态

# ============================================================================
# 启动说明
# ============================================================================
# 1. 启动命令: python run_live.py
# 2. 指定配置文件: python run_live.py custom_config.yaml
# 3. 停止命令: Ctrl+C
# 4. 查看日志: tail -f logs/wyckoff_production.log
# 5. 健康报告: 每小时自动生成，保存在 reports/ 目录