# ============================================
# 威科夫全自动逻辑引擎 - Docker Compose 编排
# ============================================
version: "3.8"

services:
  wyckoff:
    build: .
    container_name: wyckoff-engine
    restart: always
    ports:
      - "9527:9527"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
      - ./evolution_results:/app/evolution_results
      - ./evolution_data:/app/evolution_data
      - ./reports:/app/reports
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
